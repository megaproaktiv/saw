# https://taskfile.dev

version: "3"

vars:
  GREETING: Hello, World!
  BINARY_NAME: ltail
  DIST_DIR: dist
  INSTALL_DIR: ~/.local/bin

tasks:
  default:
    cmds:
      - task -l
    silent: true

  build:
    desc: Build saw binary in dist directory
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - go build -o {{.DIST_DIR}}/{{.BINARY_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST_DIR}}/{{.BINARY_NAME}}"

  install:
    desc: Install saw binary to user local bin
    deps:
      - build
    cmds:
      - mkdir -p {{.INSTALL_DIR}}
      - cp {{.DIST_DIR}}/{{.BINARY_NAME}} {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - chmod +x {{.INSTALL_DIR}}/{{.BINARY_NAME}}
    preconditions:
      - test -f {{.DIST_DIR}}/{{.BINARY_NAME}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST_DIR}}

  version:
    desc: Display current version from VERSION file
    cmds:
      - cat VERSION
    silent: true

  tag:
    desc: Create git tag from VERSION file
    cmds:
      - |
        VERSION=$(cat VERSION)
        if git rev-parse $VERSION >/dev/null 2>&1; then
          echo "Tag $VERSION already exists. Use 'task force-tag' to recreate it."
          exit 1
        fi
        git tag -a $VERSION -m "Release $VERSION"
        git push origin $VERSION
    preconditions:
      - test -f VERSION
      - sh: "git diff --quiet"
        msg: "Working directory must be clean before tagging"

  force-tag:
    desc: Create or recreate git tag from VERSION file (force)
    cmds:
      - |
        VERSION=$(cat VERSION)
        git tag -d $VERSION 2>/dev/null || true
        git push origin :refs/tags/$VERSION 2>/dev/null || true
        git tag -a $VERSION -m "Release $VERSION"
        git push origin $VERSION
    preconditions:
      - test -f VERSION
      - sh: "git diff --quiet"
        msg: "Working directory must be clean before tagging"

  release:
    desc: Create a new release with goreleaser
    deps:
      - tag
    cmds:
      - goreleaser release --clean
    preconditions:
      - sh: "command -v goreleaser"
        msg: "goreleaser is not installed. Install with: brew install goreleaser"
      - test -f VERSION

  release-dry-run:
    desc: Test release build with goreleaser without publishing (no git tag required)
    cmds:
      - goreleaser release --snapshot --clean --skip=publish
    preconditions:
      - sh: "command -v goreleaser"
        msg: "goreleaser is not installed. Install with: brew install goreleaser"
