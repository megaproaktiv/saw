# https://taskfile.dev

version: "3"

vars:
  GREETING: Hello, World!
  BINARY_NAME: saw
  DIST_DIR: dist
  INSTALL_DIR: ~/.local/bin

tasks:
  default:
    cmds:
      - task -l 
    silent: true

  build:
    desc: Build saw binary in dist directory
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - go build -o {{.DIST_DIR}}/{{.BINARY_NAME}} .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.DIST_DIR}}/{{.BINARY_NAME}}"

  install:
    desc: Install saw binary to user local bin
    deps:
      - build
    cmds:
      - mkdir -p {{.INSTALL_DIR}}
      - cp {{.DIST_DIR}}/{{.BINARY_NAME}} {{.INSTALL_DIR}}/{{.BINARY_NAME}}
      - chmod +x {{.INSTALL_DIR}}/{{.BINARY_NAME}}
    preconditions:
      - test -f {{.DIST_DIR}}/{{.BINARY_NAME}}

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.DIST_DIR}}
